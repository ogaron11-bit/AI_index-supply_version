name: Expire GitHub Pages

on:
  schedule:
    - cron: '0 15 * * *'  # 毎日 JST 0:00 (UTC 15:00)
  workflow_dispatch:        # 手動実行も可能

jobs:
  check-and-expire:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 期限チェック
        id: check
        run: |
          EXPIRE="${{ vars.EXPIRE_DATE }}"
          TODAY=$(TZ='Asia/Tokyo' date +%Y-%m-%d)
          echo "期限: $EXPIRE / 今日: $TODAY"
          if [[ "$TODAY" > "$EXPIRE" ]] || [[ "$TODAY" == "$EXPIRE" ]]; then
            echo "expired=true" >> $GITHUB_OUTPUT
          else
            echo "expired=false" >> $GITHUB_OUTPUT
          fi

      - name: 公開終了ページに差し替え
        if: steps.check.outputs.expired == 'true'
        run: |
          cat > index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="ja">
          <head>
            <meta charset="UTF-8">
            <title>公開終了</title>
            <style>
              body { text-align:center; font-family:sans-serif; padding:80px; background:#f5f5f5; }
              h1 { color:#555; }
            </style>
          </head>
          <body>
            <h1>このページは公開期間が終了しました。</h1>
          </body>
          </html>
          HTMLEOF

      - name: コミット＆プッシュ
        if: steps.check.outputs.expired == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: 公開期間終了 - ページを差し替え"
          git push