<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パソコン起動と同時に、自動実行されるタスク（一部）</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background:
        radial-gradient(ellipse 70% 60% at 20% 20%, rgba(30,70,90,0.9) 0%, transparent 60%),
        radial-gradient(ellipse 60% 60% at 80% 80%, rgba(70,110,120,0.6) 0%, transparent 60%),
        linear-gradient(160deg, #1e3a4a 0%, #2a5060 100%);
      min-height: 100vh;
      color: #fff;
      padding: 3rem 1.5rem 5rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      margin-bottom: 3rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: rgba(255,255,255,0.9); }
    .back-link svg { width: 14px; height: 14px; }

    .container {
      max-width: 780px;
      margin: 0 auto;
    }

    .page-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }

    .intro {
      font-size: 0.95rem;
      font-weight: 300;
      line-height: 1.9;
      color: rgba(255,255,255,0.85);
      margin-bottom: 2.5rem;
      padding: 1.2rem 1.5rem;
      background: rgba(255,255,255,0.05);
      border-left: 3px solid rgba(245,180,70,0.6);
      border-radius: 0 4px 4px 0;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .task-item {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      padding: 1.4rem 1.6rem;
      position: relative;
      transition: background 0.25s;
    }

    .task-item:hover { background: rgba(255,255,255,0.1); }

    .task-number {
      position: absolute;
      top: 1.2rem;
      left: 1.6rem;
      font-family: 'Noto Serif JP', serif;
      font-size: 0.75rem;
      font-weight: 700;
      color: rgba(245,180,70,0.8);
      letter-spacing: 0.1em;
    }

    .task-body { padding-left: 1.8rem; }

    .task-title {
      font-size: clamp(0.88rem, 2.5vw, 1rem);
      font-weight: 500;
      line-height: 1.5;
      color: #fff;
      margin-bottom: 0.7rem;
    }

    .sub-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .sub-list li {
      font-size: 0.82rem;
      font-weight: 300;
      color: rgba(255,255,255,0.7);
      padding-left: 1rem;
      position: relative;
      line-height: 1.6;
    }

    .sub-list li::before {
      content: '–';
      position: absolute;
      left: 0;
      color: rgba(255,255,255,0.35);
    }

    .task-meta {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.45);
      font-weight: 300;
      margin-top: 0.4rem;
    }

    .etc-note {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.2em;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      トップに戻る
    </a>

    <p class="page-label">Registered Tasks · Overview</p>
    <h1>起動時の実行タスク</h1>

    <p class="intro">
      自動実行されるタスクは次の通りです。
    </p>

    <div class="task-list">
      <div class="task-item">
        <span class="task-number">01</span>
        <div class="task-body">
          <p class="task-title">起動時（PCログオン）に一斉起動</p>
          <ul class="sub-list">
            <li>複数のWEBページ、エディタ、カレンダー、生成AIアプリ、メニューランチャー起動</li>
          </ul>
        </div>
      </div>
      <div class="task-item">
        <span class="task-number">02</span>
        <div class="task-body">
          <p class="task-title">PCのシャットダウン登録</p>
          <p class="task-meta">（設定時刻）</p>
        </div>
      </div>
      <div class="task-item">
        <span class="task-number">03</span>
        <div class="task-body">
          <p class="task-title">日報作成機能登録</p>
          <p class="task-meta">（設定時刻）</p>
        </div>
      </div>
      <div class="task-item">
        <span class="task-number">04</span>
        <div class="task-body">
          <p class="task-title">メッセージ告知表示登録</p>
          <p class="task-meta">（設定曜日、設定時刻）</p>
        </div>
      </div>
      <div class="task-item">
        <span class="task-number">05</span>
        <div class="task-body">
          <p class="task-title">定期メール添付ファイル保存</p>
          <p class="task-meta">（設定日または設定曜日）</p>
        </div>
      </div>
    </div>

    <p class="etc-note">など</p>
  </div>
</body>
</html>
